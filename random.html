<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Random Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background-image: none !important;
      background: #0f172a !important;
    }
    body::before {
      display: none !important;
    }
  </style>
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen">
  <header class="p-6 flex items-center justify-between gap-4 flex-wrap">
    <div>
      <h1 class="text-3xl font-bold">🎲 Random Generator</h1>
      <p class="text-slate-400 text-sm">Configurable random numbers and dice rolls</p>
    </div>
    <a id="backLink" href="index.html" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg transition-all duration-300 text-sm">Back to Dashboard</a>
  </header>

  <main class="p-6">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 max-w-6xl mx-auto">
      <section class="bg-slate-800 rounded-xl shadow-lg p-6">
        <h2 class="text-2xl font-semibold mb-4">Random Number Generator</h2>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
          <div>
            <label for="rngMin" class="block text-xs text-slate-400 mb-1">Minimum</label>
            <input id="rngMin" type="number" value="1" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label for="rngMax" class="block text-xs text-slate-400 mb-1">Maximum</label>
            <input id="rngMax" type="number" value="100" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
          <div>
            <label for="rngCount" class="block text-xs text-slate-400 mb-1">How Many</label>
            <input id="rngCount" type="number" value="1" min="1" max="100" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          </div>
        </div>

        <div class="flex items-center gap-3 mb-4">
          <label class="inline-flex items-center gap-2 text-sm text-slate-300">
            <input id="rngUnique" type="checkbox" class="accent-blue-500" />
            No duplicates
          </label>
        </div>

        <div class="flex gap-3">
          <button id="generateRngBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold transition-all duration-300 active:scale-95">Generate</button>
          <button id="copyRngBtn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-semibold transition-all duration-300 active:scale-95">Copy</button>
        </div>

        <div class="mt-5 bg-slate-900 border border-slate-700 rounded-lg p-4 min-h-28">
          <p class="text-slate-400 text-sm mb-2">Result</p>
          <p id="rngResult" class="text-lg font-semibold break-words">—</p>
          <p id="rngInfo" class="text-xs text-slate-500 mt-2"></p>
        </div>
      </section>

      <section class="bg-slate-800 rounded-xl shadow-lg p-6">
        <h2 class="text-2xl font-semibold mb-4">Dice Roller</h2>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
          <div>
            <label for="diceCount" class="block text-xs text-slate-400 mb-1">Number of Dice</label>
            <input id="diceCount" type="number" value="1" min="1" max="100" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500" />
          </div>
          <div>
            <label for="diceSides" class="block text-xs text-slate-400 mb-1">Sides per Die</label>
            <input id="diceSides" type="number" value="6" min="2" max="1000" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500" />
          </div>
          <div>
            <label for="diceModifier" class="block text-xs text-slate-400 mb-1">Modifier</label>
            <input id="diceModifier" type="number" value="0" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded text-slate-100 focus:outline-none focus:ring-2 focus:ring-purple-500" />
          </div>
        </div>

        <div class="flex flex-wrap gap-2 mb-4">
          <button class="dice-preset px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm" data-sides="4">d4</button>
          <button class="dice-preset px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm" data-sides="6">d6</button>
          <button class="dice-preset px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm" data-sides="8">d8</button>
          <button class="dice-preset px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm" data-sides="10">d10</button>
          <button class="dice-preset px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm" data-sides="12">d12</button>
          <button class="dice-preset px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm" data-sides="20">d20</button>
          <button class="dice-preset px-3 py-1 bg-slate-700 hover:bg-slate-600 rounded text-sm" data-sides="100">d100</button>
        </div>

        <div class="flex gap-3">
          <button id="rollDiceBtn" class="px-4 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg font-semibold transition-all duration-300 active:scale-95">Roll Dice</button>
          <button id="copyDiceBtn" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg font-semibold transition-all duration-300 active:scale-95">Copy</button>
        </div>

        <div class="mt-5 bg-slate-900 border border-slate-700 rounded-lg p-4 min-h-28">
          <p class="text-slate-400 text-sm mb-2">Roll Result</p>
          <p id="diceResult" class="text-lg font-semibold break-words">—</p>
          <p id="diceDetails" class="text-xs text-slate-500 mt-2"></p>
        </div>
      </section>
    </div>
  </main>

  <script src="random.js" defer></script>
  <script>
    (function () {
      const backLink = document.getElementById('backLink');
      if (!backLink) return;
      const from = new URLSearchParams(window.location.search).get('from');
      if (from === 'landing') {
        backLink.href = '/landing';
        backLink.textContent = 'Back to Landing';
      } else {
        backLink.href = 'index.html';
        backLink.textContent = 'Back to Dashboard';
      }
    })();
  </script>
</body>
</html>
